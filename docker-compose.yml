# docker-compose.yml (snippet)
services:
  backend:
    build: .
    expose:
      - "3000"               # internal, used only by nginx
    environment:
      - ADMIN_USER=icuadmin
      - ADMIN_PASS=Temporaryp4ss
    # optional: volumes, etc.

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro    # if you use TLS
