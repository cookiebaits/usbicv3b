diff --git a/src/routes/auth.js b/src/routes/auth.js
index 5d28c8a..b7a3e1d 100644
--- a/src/routes/auth.js
+++ b/src/routes/auth.js
@@
 const router = express.Router();
 const { ADMIN_USER, ADMIN_PASS } = require('../../config/config');
 
-// NOTE: The original repo only had a GET handler here, which returned HTML.
-// The SPA expects a JSON response from a POST request.
-
-// Existing GET route (kept for completeness – it now returns 405 JSON)
-router.get('/login', (req, res) => {
-  res.status(405).json({ error: 'Use POST /api/admin/login' });
-});
+// --------------------------------------------------------------
+//  POST /login – expected by the admin‑portal JavaScript
+// --------------------------------------------------------------
+router.post('/login', (req, res) => {
+  const { username, password } = req.body || {};
+  if (username === ADMIN_USER && password === ADMIN_PASS) {
+    // In a production app you would issue a JWT or signed cookie.
+    // Here we just set a flag in the session (if sessions are used).
+    if (req.session) req.session.isAdmin = true;
+    return res.json({ success: true, message: 'Logged in' });
+  }
+  return res.status(401).json({ success: false, message: 'Invalid credentials' });
+});
+
+// --------------------------------------------------------------
+//  Optional: keep the GET route for older browsers – return a proper JSON error
+// --------------------------------------------------------------
+router.get('/login', (req, res) => {
+  res.status(405).json({ error: 'POST /api/admin/login required' });
+});
 
 module.exports = router;
diff --git a/src/server.js b/src/server.js
index 47f19ab..9b5c2e6 100644
--- a/src/server.js
+++ b/src/server.js
@@
 const path = require('path');
 const logger = require('./logger');
 const helmet = require('helmet');
+const session = require('express-session'); // if you use sessions (optional)
 
 const app = express();
 
 // -----------------------------------------------------------------
 // Middleware
 // -----------------------------------------------------------------
-app.use(express.json());            // <-- make sure this line exists!
-app.use(express.urlencoded({ extended: true }));
+app.use(express.json());            // parse JSON bodies
+app.use(express.urlencoded({ extended: true }));
+
+// OPTIONAL: basic session handling, useful for the "/admin" UI
+app.use(session({
+  secret: process.env.SESSION_SECRET || 'fallback-secret',
+  resave: false,
+  saveUninitialized: true,
+  cookie: { secure: false }   // set true if you terminate TLS at NGINX
+}));
 
 // -----------------------------------------------------------------
 // Static assets (the admin UI lives in ./public)
 // -----------------------------------------------------------------
 app.use(express.static(path.join(__dirname, '..', 'public')));
 
 // -----------------------------------------------------------------
 // API routes
 // -----------------------------------------------------------------
-const authRouter = require('./routes/auth');
-app.use('/api/admin', authRouter);
+const authRouter = require('./routes/auth');
+app.use('/api/admin', authRouter);
 
 // -----------------------------------------------------------------
 // Fallback for SPA – any unknown GET goes to index.html
 // -----------------------------------------------------------------
 app.get('*', (req, res) => {
   res.sendFile(path.join(__dirname, '..', 'public', 'index.html'));
 });
diff --git a/docker/nginx/default.conf b/docker/nginx/default.conf
index 4fcb2c7..c901c68 100644
--- a/docker/nginx/default.conf
+++ b/docker/nginx/default.conf
@@
 server {
     listen       80;
     server_name  _;
 
     # -------------------------------------------------------------
     # Serve static SPA files
     # -------------------------------------------------------------
     root /usr/share/nginx/html;
     index index.html;
 
-    # -------------------------------------------------------------
-    # Default: Deliver files from the SPA folder – no API proxy.
-    # -------------------------------------------------------------
-    location / {
-        try_files $uri $uri/ /index.html;
-    }
+    # -------------------------------------------------------------
+    # 1️⃣ Proxy API calls to the Node backend
+    # -------------------------------------------------------------
+    location /api/ {
+        # The backend container is called "backend" in the compose file.
+        # If your service has another name, replace it accordingly.
+        proxy_pass http://backend:3000;
+        proxy_http_version 1.1;
+        proxy_set_header Upgrade $http_upgrade;
+        proxy_set_header Connection "upgrade";
+        proxy_set_header Host $host;
+        proxy_set_header X-Real-IP $remote_addr;
+        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
+        proxy_set_header X-Forwarded-Proto $scheme;
+        proxy_buffering off;
+    }
+
+    # -------------------------------------------------------------
+    # 2️⃣ Serve the SPA (HTML/JS/CSS) for every other request
+    # -------------------------------------------------------------
+    location / {
+        try_files $uri $uri/ /index.html;
+    }
 }
